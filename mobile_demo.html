<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; background: #6b7280;
    font-family: 'Noto Sans Devanagari', sans-serif;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: flex-end;
  }
  #phone-wrap {
    width: min(100%, 480px);
    height: 100%;
    max-height: 900px;
    display: flex;
    flex-direction: column;
    background: #e8e4dc;
    box-shadow: 0 -5px 40px rgba(0,0,0,0.5);
    border-radius: 12px 12px 0 0;
    position: relative;
    overflow: hidden;
  }
  #action-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; background: #1a3a2a; border-bottom: 2px solid #4caf80;
  }
  #action-bar .title { color: #4caf80; font-size: 15px; font-weight: bold; letter-spacing: 1px; }
  .action-btn { padding: 5px 12px; border-radius: 6px; border: none; font-size: 12px; font-weight: 700; cursor: pointer; }
  .action-btn.reset { background: #6b7280; color: #fff; }

  #editor {
    flex: 1; width: 100%; background: #faf7f2;
    padding: 16px 20px; font-size: 30px; line-height: 1.9;
    border: none; outline: none; overflow-y: auto;
    white-space: pre-wrap; color: #1a1208; overflow-wrap: break-word;
  }
  .cursor { color: #4caf80; animation: blink 1s step-end infinite; font-weight: 100; }
  @keyframes blink { from, to { opacity: 0; } 50% { opacity: 1; } }

  #keyboard-wrap {
    position: relative;
    width: 100%;
    flex-shrink: 0;
    border-top: 1px solid #888;
    background: #b5b0a8;
    touch-action: none; /* 브라우저 기본 핀치줌/패닝을 막고 제스처를 JS가 전담 처리 */
  }
  #kbd-image { display: block; width: 100%; height: auto; user-select: none; -webkit-user-drag: none; }
  #kbd { position: absolute; top: 0; left: 0; right: 0; bottom: 0; touch-action: none; }

  .kbd-btn {
    position: absolute;
    background: transparent;
    border: none;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    touch-action: none;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Noto Sans Devanagari', sans-serif;
    font-weight: bold;
    padding: 0;
  }
  .kbd-btn:active { opacity: 0.5; }

  /* 자음키/백스페이스/123/스페이스/엔터: 이미지에 이미 라벨이 그려져 있어 텍스트 없음 */
  .kbd-cons, .kbd-bs, .kbd-123, .kbd-space, .kbd-enter { font-size: 0; }

  /* 모음·부호키 + 다음키: 이미지가 공란이라 JS가 라벨을 그려 넣음 */
  .kbd-label {
    flex-direction: row; flex-wrap: nowrap;
    justify-content: center; align-items: center;
    gap: 0 3px; line-height: 1;
    color: #3a6b1f; font-weight: 700;
    overflow: hidden;
  }
  .kbd-label .label-item { line-height: 1; white-space: nowrap; }
  .kbd-label.count-1 .label-item,
  .kbd-label.count-2 .label-item { font-size: clamp(11px, 4.2vw, 19px); }
  .kbd-label.count-3 .label-item { font-size: clamp(8px, 3.0vw, 14px); }
  .kbd-label.next-idle .label-item { color: #1a1208; font-weight: 900; transform: translateY(0.12em); }

  /* 다음키(K): 자판에서 가장 중요한 키라 항상 더 크게 (최대 2글자만 표시되므로 여유 있음) */
  .kbd-label.kbd-next.count-1 .label-item,
  .kbd-label.kbd-next.count-2 .label-item { font-size: clamp(15px, 5.6vw, 25px); }
  .kbd-label.kbd-next.next-idle.count-1 .label-item { font-size: clamp(13px, 4.6vw, 20px); }
  .kbd-label.kbd-next { gap: 0 1px; }
  .kbd-label.independent .label-item { color: #404040; }
  .kbd-label.next-active { color: #00b0f0; }

  /* 영문 모드: 로마자 글자 라벨 */
  .kbd-label.kbd-eng-letter { color: #1a1208; font-weight: 700; }
  .kbd-label.kbd-eng-letter .label-item { font-size: clamp(15px, 5.6vw, 25px); }

  /* 시프트 키: 캡스락/일시 대문자 상태를 초록 점으로 표시 */
  .kbd-shift { font-size: 0; }
  .kbd-shift .shift-dot {
    position: absolute; top: 10%; right: 12%;
    width: 16%; height: 16%; border-radius: 50%;
    background: transparent; transition: background 0.15s;
  }
  .kbd-shift.locked .shift-dot { background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,0.9); }
  .kbd-shift.once .shift-dot { background: #86efac; }

</style>
</head>
<body>
<div id="phone-wrap">
<div id="action-bar">
  <span class="title">पाकाहारा</span>
  <button class="action-btn reset" onclick="resetAll()">↺ रीसेट</button>
</div>
<div id="editor"></div>
<div id="keyboard-wrap">
  <img id="kbd-image" src="images/keyboard.png" alt="keyboard" draggable="false" />
  <div id="kbd"></div>
</div>
</div>

<script>
// ── 자음 그룹: 대표 자음 입력 직후 다음키(K)를 누르면 그룹 내에서 순차 전환 ──
const consonantGroups = {
  'क': ['क','ख'],
  'ग': ['ग','घ'],
  'च': ['च','छ'],
  'ज': ['ज','झ'],
  'ट': ['ट','ठ'],
  'ड': ['ड','ढ'],
  'त': ['त','थ'],
  'द': ['द','ध'],
  'न': ['न','ण','ञ'],
  'प': ['प','फ'],
  'ब': ['ब','भ'],
  'म': ['म','ङ'],
  'र': ['र','ल','ळ'],
  'ह': ['ह','य','व'],
  'स': ['स','श','ष'],
};

const leftKeys = [
  ['ब','द','स','न','च'],
  ['प','क','ह','र','ड'],
  ['ग','ज','त','म','ट'],
];

// 다음키(K, 홈로우 우측 중지 위치)를 중심으로 상/하/좌/우/대각선에 배치되는 모음·부호키
// indep: 독립모음 모드일 때 대체 표시/입력되는 문자 (없으면 chars 그대로 유지)
const rightKeys = [
  [
    { id:'U', type:'sign', chars:['ं','ँ'], indepGrow:'mark', indepLabel:['?','!'] },
    { id:'I', type:'sign', chars:['े','ै'], indep:['ए','ऐ'] },
    { id:'O', type:'sign', chars:['ो','ौ'], indep:['ओ','औ'] },
  ],
  [
    { id:'J', type:'sign', chars:['ि'], indep:['इ'] },
    { id:'K', type:'next' },
    { id:'L', type:'sign', chars:['ा','ी','ः'], indep:['आ','ई'] },
  ],
  [
    { id:'N', type:'sign', chars:['्','़'], indepGrow:'period', indepLabel:[',','.'] },
    { id:'M', type:'sign', chars:['ु','ू','ृ'], indep:['उ','ऊ','ऋ'] },
    { id:'BS', type:'bs' },
  ],
];

let state = {
  activeRoot: null,
  activeCharIdx: 0,
  lastSignKey: null,
  signTapIdx: 0,
  signIndepMode: false,
  independentMode: false,
  // 영문(로마자) 모드 상태
  engActive: false,       // true면 쿼티 자판 표시 중
  engShiftState: 'lock',  // 'lock'(캡스락) | 'once'(다음 한 글자만 대문자) | 'off'(소문자)
  engOneShot: true,       // true면 스페이스 입력 시 자동으로 파카하라 복귀
};

const editor = document.getElementById('editor');
function getText() { return editor.dataset.text || ''; }
function setText(t) {
  editor.dataset.text = t;
  const esc = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  editor.innerHTML = esc + `<span class="cursor">|</span>`;
}
function appendText(c) { setText(getText() + c); }
function replaceLastChar(c) { const t=getText(); if(!t.length)return; setText(t.slice(0,-1)+c); }
function backspace() { const t=getText(); if(!t.length)return; setText(t.slice(0,-1)); }

function getRootOf(char) {
  for (const [root, arr] of Object.entries(consonantGroups)) if (arr.includes(char)) return root;
  return null;
}

// 독립모음 모드는 오직 스페이스바를 눌렀을 때만 진입한다
function independentActive() {
  if (state.independentMode) return true;
  return getText().endsWith(' ');
}

function handleConsonant(root) {
  appendText(root);
  state.activeRoot = root; state.activeCharIdx = 0;
  state.lastSignKey = null; state.signTapIdx = 0;
  state.independentMode = false;
  render();
}

function handleNext() {
  if (independentActive()) {
    if (state.lastSignKey === 'K' && state.signIndepMode) { return; } // 'अ' 하나뿐, 재입력 없음
    const t = getText();
    if (t.endsWith(' ')) setText(t.slice(0, -1));
    appendText('अ');
    state.independentMode = true;
    state.lastSignKey = 'K'; state.signTapIdx = 0; state.signIndepMode = true;
    state.activeRoot = null; state.activeCharIdx = 0;
    render(); return;
  }
  if (!state.activeRoot) return;
  const arr = consonantGroups[state.activeRoot];
  const nextIdx = (state.activeCharIdx + 1) % arr.length;
  replaceLastChar(arr[nextIdx]);
  state.activeCharIdx = nextIdx;
  state.lastSignKey = null; state.signTapIdx = 0;
  render();
}

function handleVowelKey(def) {
  const isIndep = independentActive();
  // 독립모음 모드에서는 독립모음 한 바퀴를 다 돈 다음 의존모음 한 바퀴, 다시 독립모음 순으로 순환한다
  const chars = isIndep ? (def.indep ? def.indep.concat(def.chars) : def.chars) : def.chars;

  if (state.lastSignKey === def.id && state.signIndepMode === isIndep) {
    state.signTapIdx = (state.signTapIdx + 1) % chars.length;
    const t = getText(); setText(t.slice(0, -1) + chars[state.signTapIdx]);
  } else {
    if (isIndep) {
      const t = getText();
      if (t.endsWith(' ')) setText(t.slice(0, -1));
      appendText(chars[0]);
      state.independentMode = true;
    } else {
      appendText(chars[0]);
    }
    state.lastSignKey = def.id; state.signTapIdx = 0; state.signIndepMode = isIndep;
  }
  state.activeRoot = null; state.activeCharIdx = 0;
  render();
}

// 독립모음 모드에서 U(1행6열)·N(3행6열) 키는 의존 부호 대신 문장부호를 낸다.
// U: ? - ! - ?? - !! - ??? - !!! - ???? - ... (상한 없이 계속 늘어남)
// N: , - . - .. - ... - .... - ... (마침표는 상한 없이 계속 늘어남)
function punctSeq(id, idx) {
  if (id === 'U') { const n = Math.floor(idx / 2) + 1; return (idx % 2 === 0 ? '?' : '!').repeat(n); }
  if (id === 'N') { return idx === 0 ? ',' : '.'.repeat(idx); }
  return '';
}

// 이 키들은 입력 후 항상 끝에 공란을 하나 붙여두고, 같은 키를 다시 누르면
// 직전에 붙인 "부호+공란"을 지우고 다음 부호+공란으로 교체한다.
function handlePunctKey(def) {
  if (state.lastSignKey === def.id && state.signIndepMode) {
    const prevStr = punctSeq(def.id, state.signTapIdx);
    const t = getText();
    setText(t.slice(0, -(prevStr.length + 1)));
    state.signTapIdx += 1;
    appendText(punctSeq(def.id, state.signTapIdx) + ' ');
  } else {
    const t = getText();
    if (t.endsWith(' ')) setText(t.slice(0, -1));
    appendText(punctSeq(def.id, 0) + ' ');
    state.independentMode = true;
    state.lastSignKey = def.id; state.signTapIdx = 0; state.signIndepMode = true;
  }
  state.activeRoot = null; state.activeCharIdx = 0;
  render();
}

function handleBS() {
  backspace();
  state.lastSignKey = null; state.signTapIdx = 0; state.independentMode = false;
  const t = getText();
  const last = t.length ? t[t.length - 1] : null;
  const root = last ? getRootOf(last) : null;
  state.activeRoot = root;
  state.activeCharIdx = root ? consonantGroups[root].indexOf(last) : 0;
  render();
}

function handleSpace() {
  appendText(' ');
  state.activeRoot = null; state.activeCharIdx = 0;
  state.lastSignKey = null; state.signTapIdx = 0;
  state.independentMode = false;
  render();
}

function handleEnter() {
  appendText('\n');
  state.activeRoot = null; state.activeCharIdx = 0;
  state.lastSignKey = null; state.signTapIdx = 0;
  state.independentMode = false;
  render();
}

// ── 좌표 (이미지 1421×778 픽셀 실측 기준 %) ──────────────────────────────
const KEY_COLS = [1.55, 14.00, 26.39, 38.78, 51.16, 63.62, 76.14, 88.60];
const KEY_ROWS = [3.09, 27.89, 52.44];
const KEY_W = 9.53, KEY_H = 19.97;
const BOT_Y = 77.12, BOT_H = 19.92;
const BOT_SECTIONS = { num:[0.92,26.04], space:[26.04,73.82], enter:[73.82,98.94] };

// ── 영문(쿼티) 자판 좌표 (images/keyboard_eng.png 2176×1182 실측 기준 %) ──
const ENG_ROW_TOP = [2.45, 27.50, 52.54];
const ENG_ROW_H = 20.13;
const ENG_KEY_W = 8.594;
const ENG_ROW1 = ['Q','W','E','R','T','Y','U','I','O','P'];
const ENG_ROW2 = ['A','S','D','F','G','H','J','K','L'];
const ENG_ROW3 = ['Z','X','C','V','B','N','M'];
const ENG_ROW1_COLS = [1.06,10.94,20.86,30.76,40.67,50.55,60.48,70.36,80.29,90.17];
const ENG_ROW2_COLS = [6.07,15.95,25.87,35.76,45.64,55.56,65.44,75.37,85.25];
const ENG_ROW3_COLS = [15.86,25.78,35.66,45.54,55.47,65.35,75.28];
const ENG_SHIFT = { left:1.01, width:11.90 };
const ENG_BACKSPACE = { left:86.99, width:11.90 };
const ENG_BOT_Y = 77.08, ENG_BOT_H = 20.13;
const ENG_BOT = {
  num:   { left:1.29,  width:19.30 },
  space: { left:22.93, width:54.27 },
  enter: { left:79.46, width:19.12 },
};

// 두 손가락 제스처 도중 닿은 손가락이 키 입력으로 잘못 찍히는 것을 막기 위한 장치.
// 손가락이 닿는 순간 바로 입력을 확정하지 않고 GESTURE_GUARD_MS만큼 유예했다가,
// 그 사이에 실제 핀치/스프레드 "움직임"이 감지되면 입력을 취소한다.
// 주의: 단순히 손가락이 2개 겹쳐 닿은 것만으로는 켜지 않는다 — 빠르게 연타할 때
// (특히 양손 엄지로 번갈아 칠 때) 이전 손가락이 떼기 전에 다음 손가락이 눌리는
// 겹침이 흔히 발생하는데, 이걸 전부 제스처로 오인하면 정상 타이핑이 자꾸 씹힌다.
// kbdMultiTouchActive는 initPinchGesture의 touchmove에서 실제 거리 변화가
// 임계치를 넘을 때만 true가 된다.
const GESTURE_GUARD_MS = 70;
let kbdMultiTouchActive = false;

function makeBtn(cls, style, onClick) {
  const b = document.createElement('button');
  b.className = 'kbd-btn ' + cls;
  Object.assign(b.style, style);
  if (onClick) b.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    setTimeout(() => { if (!kbdMultiTouchActive) onClick(); }, GESTURE_GUARD_MS);
  });
  return b;
}

function makeLetterBtn(ch, style, onClick) {
  const b = makeBtn('kbd-label kbd-eng-letter', style, onClick);
  const sp = document.createElement('span');
  sp.className = 'label-item';
  sp.textContent = ch;
  b.appendChild(sp);
  return b;
}

// ── 영문 모드 진입/이탈 (두 손가락으로 펼치기/좁히기) ──
function enterEnglishMode() {
  if (shiftTapTimer) { clearTimeout(shiftTapTimer); shiftTapTimer = null; }
  state.engActive = true;
  state.engShiftState = 'lock';
  state.engOneShot = true;
  state.activeRoot = null; state.activeCharIdx = 0;
  state.lastSignKey = null; state.signTapIdx = 0;
  state.independentMode = false;
  document.getElementById('kbd-image').src = 'images/keyboard_eng.png';
  render();
}

function exitEnglishMode() {
  if (shiftTapTimer) { clearTimeout(shiftTapTimer); shiftTapTimer = null; }
  state.engActive = false;
  state.engShiftState = 'lock';
  state.engOneShot = true;
  document.getElementById('kbd-image').src = 'images/keyboard.png';
  render();
}

function handleEngLetter(ch) {
  appendText(state.engShiftState === 'off' ? ch.toLowerCase() : ch.toUpperCase());
  if (state.engShiftState === 'once') state.engShiftState = 'off';
  render();
}

function handleEngSpace() {
  appendText(' ');
  if (state.engOneShot) { exitEnglishMode(); return; }
  render();
}

function handleEngBackspace() {
  backspace();
  render();
}

function handleEngEnter() {
  appendText('\n');
  if (state.engOneShot) { exitEnglishMode(); return; }
  render();
}

// 시프트: 더블탭=캡스락 토글(다른 폰 키보드와 동일 관례), 싱글탭=임시 대문자 1글자
// 단, 최초 진입 직후(캡스락+일회성)에는 싱글탭 한 번으로 락과 일회성을 모두 해제한다
// 더블탭 여부는 두 번째 탭이 실제로 오는지 지켜봐야 하므로, 첫 탭은 타이머로 유예한 뒤
// 유예 시간 안에 두 번째 탭이 오면 그 시점에 취소하고 토글로 대체한다(사후 시간차 비교 방식은
// 첫 탭에서 싱글 동작이 이미 실행돼버려 더블탭 시 엉뚱하게 겹쳐 적용되는 버그가 있었음).
let shiftTapTimer = null;
function handleShiftTap() {
  if (shiftTapTimer) {
    clearTimeout(shiftTapTimer);
    shiftTapTimer = null;
    state.engShiftState = state.engShiftState === 'lock' ? 'off' : 'lock';
    render();
    return;
  }
  shiftTapTimer = setTimeout(() => {
    shiftTapTimer = null;
    if (state.engShiftState === 'lock') {
      state.engShiftState = 'off';
      state.engOneShot = false;
    } else if (state.engShiftState === 'once') {
      state.engShiftState = 'off';
    } else {
      state.engShiftState = 'once';
    }
    render();
  }, 300);
}

function renderEng() {
  const kbd = document.getElementById('kbd');
  kbd.innerHTML = '';
  const upper = state.engShiftState !== 'off';

  ENG_ROW1.forEach((ch, i) => kbd.appendChild(makeLetterBtn(upper ? ch : ch.toLowerCase(), {
    left: ENG_ROW1_COLS[i] + '%', top: ENG_ROW_TOP[0] + '%', width: ENG_KEY_W + '%', height: ENG_ROW_H + '%'
  }, () => handleEngLetter(ch))));

  ENG_ROW2.forEach((ch, i) => kbd.appendChild(makeLetterBtn(upper ? ch : ch.toLowerCase(), {
    left: ENG_ROW2_COLS[i] + '%', top: ENG_ROW_TOP[1] + '%', width: ENG_KEY_W + '%', height: ENG_ROW_H + '%'
  }, () => handleEngLetter(ch))));

  ENG_ROW3.forEach((ch, i) => kbd.appendChild(makeLetterBtn(upper ? ch : ch.toLowerCase(), {
    left: ENG_ROW3_COLS[i] + '%', top: ENG_ROW_TOP[2] + '%', width: ENG_KEY_W + '%', height: ENG_ROW_H + '%'
  }, () => handleEngLetter(ch))));

  const shiftCls = 'kbd-shift' + (state.engShiftState === 'lock' ? ' locked' : state.engShiftState === 'once' ? ' once' : '');
  const shiftBtn = makeBtn(shiftCls, {
    left: ENG_SHIFT.left + '%', top: ENG_ROW_TOP[2] + '%', width: ENG_SHIFT.width + '%', height: ENG_ROW_H + '%'
  }, handleShiftTap);
  const dot = document.createElement('span');
  dot.className = 'shift-dot';
  shiftBtn.appendChild(dot);
  kbd.appendChild(shiftBtn);

  kbd.appendChild(makeBtn('kbd-bs', {
    left: ENG_BACKSPACE.left + '%', top: ENG_ROW_TOP[2] + '%', width: ENG_BACKSPACE.width + '%', height: ENG_ROW_H + '%'
  }, handleEngBackspace));

  kbd.appendChild(makeBtn('kbd-123', {
    left: ENG_BOT.num.left + '%', top: ENG_BOT_Y + '%', width: ENG_BOT.num.width + '%', height: ENG_BOT_H + '%'
  }, () => { /* 숫자판은 데모 범위 밖 */ }));

  kbd.appendChild(makeBtn('kbd-space', {
    left: ENG_BOT.space.left + '%', top: ENG_BOT_Y + '%', width: ENG_BOT.space.width + '%', height: ENG_BOT_H + '%'
  }, handleEngSpace));

  kbd.appendChild(makeBtn('kbd-enter', {
    left: ENG_BOT.enter.left + '%', top: ENG_BOT_Y + '%', width: ENG_BOT.enter.width + '%', height: ENG_BOT_H + '%'
  }, handleEngEnter));
}

// ── 두 손가락 펼치기/좁히기 제스처로 영문 ↔ 파카하라 전환 ──
(function initPinchGesture() {
  const wrap = document.getElementById('keyboard-wrap');
  let startDist = null;
  let triggered = false;

  function dist(touches) {
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.hypot(dx, dy);
  }

  // 네이티브 핀치줌이 같이 발동하면 제스처 이후에도 화면이 확대된 채로 남으므로,
  // 두 손가락이 닿아 있는 동안은 확실히 preventDefault로 막는다(touch-action:none과 이중 방어).
  wrap.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      e.preventDefault();
      startDist = dist(e.touches);
      triggered = false;
    }
  }, { passive: false });

  // kbdMultiTouchActive는 여기, 실제 두 점 사이 거리가 GESTURE_MOVE_RATIO 이상
  // 벌어지거나 좁혀졌을 때만 켠다(단순히 손가락 2개가 닿아만 있는 상태는 제외).
  // 한 번 켜지면 이 2터치 세션이 끝날 때까지 유지한다(중간에 거리가 다시 원위치에
  // 가까워져도 꺼지지 않음 — 이미 제스처로 확정된 세션이 도중에 스치듯 흔들렸다고
  // 다시 일반 탭 취급하면 안 되므로).
  const GESTURE_MOVE_RATIO = 0.06;
  wrap.addEventListener('touchmove', (e) => {
    if (e.touches.length !== 2 || startDist == null) return;
    e.preventDefault();
    const ratio = dist(e.touches) / startDist;
    if (Math.abs(ratio - 1) > GESTURE_MOVE_RATIO) kbdMultiTouchActive = true;
    if (triggered) return;
    if (ratio > 1.15) {
      triggered = true;
      if (!state.engActive) enterEnglishMode();
    } else if (ratio < 0.85) {
      triggered = true;
      if (state.engActive) exitEnglishMode();
    }
  }, { passive: false });

  function endGesture(e) {
    if (e.touches.length < 2) { startDist = null; triggered = false; kbdMultiTouchActive = false; }
  }
  wrap.addEventListener('touchend', endGesture);
  wrap.addEventListener('touchcancel', endGesture);
})();

function render() {
  if (state.engActive) { renderEng(); return; }
  renderDevanagari();
}

function renderDevanagari() {
  const kbd = document.getElementById('kbd');
  kbd.innerHTML = '';
  const isIndep = independentActive();

  for (let row = 0; row < 3; row++) {
    for (let col = 0; col < 5; col++) {
      const root = leftKeys[row][col];
      kbd.appendChild(makeBtn('kbd-cons', {
        left: KEY_COLS[col] + '%', top: KEY_ROWS[row] + '%', width: KEY_W + '%', height: KEY_H + '%'
      }, () => handleConsonant(root)));
    }

    for (let col = 0; col < 3; col++) {
      const rk = rightKeys[row][col];
      const imgCol = col + 5;
      const style = { left: KEY_COLS[imgCol] + '%', top: KEY_ROWS[row] + '%', width: KEY_W + '%', height: KEY_H + '%' };

      if (rk.type === 'next') {
        let labels = [];
        let extraCls = ' kbd-next';
        if (isIndep) { labels = ['अ']; extraCls += ' independent'; }
        else if (state.activeRoot) { labels = consonantGroups[state.activeRoot].slice(1); extraCls += ' next-active'; }
        else { labels = []; extraCls += ' next-idle'; }
        if (labels.length) extraCls += ' count-' + labels.length;
        const b = makeBtn('kbd-label' + extraCls, style, handleNext);
        labels.forEach(ch => {
          const sp = document.createElement('span');
          sp.className = 'label-item'; sp.textContent = ch;
          b.appendChild(sp);
        });
        kbd.appendChild(b);

      } else if (rk.type === 'bs') {
        kbd.appendChild(makeBtn('kbd-bs', style, handleBS));

      } else if (rk.type === 'sign') {
        if (isIndep && rk.indepGrow) {
          const chars = rk.indepLabel;
          const cls = 'kbd-label count-' + chars.length + ' independent';
          const b = makeBtn(cls, style, () => handlePunctKey(rk));
          chars.forEach(ch => {
            const sp = document.createElement('span');
            sp.className = 'label-item'; sp.textContent = ch;
            b.appendChild(sp);
          });
          kbd.appendChild(b);
        } else {
          const chars = isIndep ? (rk.indep || rk.chars) : rk.chars;
          const cls = 'kbd-label count-' + chars.length + (isIndep && rk.indep ? ' independent' : '');
          const b = makeBtn(cls, style, () => handleVowelKey(rk));
          chars.forEach(ch => {
            const sp = document.createElement('span');
            sp.className = 'label-item'; sp.textContent = ch;
            b.appendChild(sp);
          });
          kbd.appendChild(b);
        }
      }
    }
  }

  // 하단바: 123 | 스페이스/스와 | 엔터
  const [n0, n1] = BOT_SECTIONS.num;
  kbd.appendChild(makeBtn('kbd-123', {
    left: n0 + '%', top: BOT_Y + '%', width: (n1 - n0) + '%', height: BOT_H + '%'
  }, () => { /* 숫자판은 데모 범위 밖: 추후 연결 */ }));

  const [s0, s1] = BOT_SECTIONS.space;
  kbd.appendChild(makeBtn('kbd-space', {
    left: s0 + '%', top: BOT_Y + '%', width: (s1 - s0) + '%', height: BOT_H + '%'
  }, handleSpace));

  const [e0, e1] = BOT_SECTIONS.enter;
  kbd.appendChild(makeBtn('kbd-enter', {
    left: e0 + '%', top: BOT_Y + '%', width: (e1 - e0) + '%', height: BOT_H + '%'
  }, handleEnter));
}

function resetAll() {
  if (shiftTapTimer) { clearTimeout(shiftTapTimer); shiftTapTimer = null; }
  setText('');
  state = {
    activeRoot:null, activeCharIdx:0, lastSignKey:null, signTapIdx:0, signIndepMode:false, independentMode:false,
    engActive:false, engShiftState:'lock', engOneShot:true,
  };
  document.getElementById('kbd-image').src = 'images/keyboard.png';
  render();
}

setText('');
render();
</script>
